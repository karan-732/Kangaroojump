      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: none;

    html, body {

      width: 100%;

      background: #000;

      max-width: 100%;
      max-height: 100%;

      background: #000;
      overscroll-behavior: none;

  function initAudio() {
    if (audio.initialized) return;
    initFeedbackAudio();
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (AudioCtx) {
      audio.ctx = new AudioCtx();
      audio.master = audio.ctx.createGain();
      audio.master.gain.value = 0.8;
      audio.sfx = audio.ctx.createGain();
      audio.sfx.gain.value = 1;
      audio.music = audio.ctx.createGain();
      audio.music.gain.value = 0.25;
      const comp = audio.ctx.createDynamicsCompressor();
      audio.sfx.connect(comp);
      audio.music.connect(comp);
      comp.connect(audio.master);
      audio.master.connect(audio.ctx.destination);
      createDrone();
    }
    audio.initialized = true;
  }

  function resumeAudio() {
    if (!audio.initialized) initAudio();
    if (audio.ctx && audio.ctx.state === 'suspended') audio.ctx.resume();
    primeFeedbackAudio();
    if (audio.ctx && !audio.nextMusicNote) {
      audio.nextMusicNote = audio.ctx.currentTime + 0.05;
      audio.stepIndex = 0;
    }
  }

  function initFeedbackAudio() {
    const uniqueFiles = new Map();
    Object.values(ROOT_FEEDBACK_LIBRARY).flat().forEach((entry) => {
      if (uniqueFiles.has(entry.file)) return;
      uniqueFiles.set(entry.file, entry);
    });

    uniqueFiles.forEach((entry, file) => {
      audio.feedbackPools[file] = {
        volume: entry.volume,
        cursor: 0,
        elements: Array.from({ length: 2 }, () => {
          const el = new Audio(encodeURI(file));
          el.preload = 'auto';
          el.volume = game.mutedMusic ? 0 : entry.volume;
          el.load();
          return el;
        })
      };
    });

    Object.keys(ROOT_FEEDBACK_LIBRARY).forEach((group) => {
      audio.feedbackRotation[group] = 0;
    });
  }

  function primeFeedbackAudio() {
    if (audio.feedbackPrimed) return;
    audio.feedbackPrimed = true;
    Object.values(audio.feedbackPools).forEach((pool) => {
      const el = pool.elements[0];
      if (!el) return;
      el.muted = true;
      const playAttempt = el.play();
      if (playAttempt && typeof playAttempt.catch === 'function') playAttempt.catch(() => {});
      setTimeout(() => {
        try {
          el.pause();
          el.currentTime = 0;
          el.muted = game.mutedMusic;
        } catch (err) {
          void err;
        }
      }, 0);
    });
  }

  function chooseFeedbackEntry(group) {
    const list = ROOT_FEEDBACK_LIBRARY[group];
    if (!list || !list.length) return null;
    const idx = audio.feedbackRotation[group] % list.length;
    audio.feedbackRotation[group] = (audio.feedbackRotation[group] + 1) % list.length;
    return list[idx];
  }

  function playFeedbackEntry(group, entryOverride = null) {
    if (!audio.initialized) initAudio();
    const entry = entryOverride || chooseFeedbackEntry(group);
    if (!entry) return null;
    const pool = audio.feedbackPools[entry.file];
    if (!pool) return entry;
    // Stop any currently playing feedback audio (one at a time)
    if (audio.currentFeedbackEl) {
      try {
        audio.currentFeedbackEl.pause();
        audio.currentFeedbackEl.currentTime = 0;
      } catch (err) { void err; }
    }
    let element = pool.elements.find((candidate) => candidate.paused || candidate.ended);
    if (!element) {
      element = pool.elements[pool.cursor % pool.elements.length];
      pool.cursor = (pool.cursor + 1) % pool.elements.length;
      try {
        element.pause();
      } catch (err) {
        void err;
      }
    }
    element.muted = game.mutedMusic;
    element.volume = game.mutedMusic ? 0 : entry.volume;
    try {
      element.currentTime = 0;
    } catch (err) {
      void err;
    }
    const playAttempt = element.play();
    if (playAttempt && typeof playAttempt.catch === 'function') playAttempt.catch(() => {});
    audio.currentFeedbackEl = element;
    return entry;
  }

  function createDrone() {
    if (!audio.ctx) return;
    audio.droneOsc = audio.ctx.createOscillator();
    audio.droneGain = audio.ctx.createGain();
    audio.droneLfo = audio.ctx.createOscillator();
    const lfoGain = audio.ctx.createGain();
    audio.droneOsc.type = 'sine';
    audio.droneOsc.frequency.value = 130;
    audio.droneGain.gain.value = 0.05;
    audio.droneLfo.frequency.value = 5;
    lfoGain.gain.value = 3;
    audio.droneLfo.connect(lfoGain);
    lfoGain.connect(audio.droneOsc.frequency);
    audio.droneOsc.connect(audio.droneGain);
    audio.droneGain.connect(audio.music);
    audio.droneOsc.start();
    audio.droneLfo.start();
  }

  function tone(type, freq, duration, volume, start = 0, sweepTo = null, target = null) {
    if (!audio.ctx) return;
    const t = audio.ctx.currentTime + start;
    const osc = audio.ctx.createOscillator();
    const gain = audio.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (sweepTo !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, sweepTo), t + duration);
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.connect(gain);
    gain.connect(target || audio.sfx);
    osc.start(t);
    osc.stop(t + duration + 0.02);
  }

  function noiseBurst(duration, volume, filterType, freq, target = null) {
    if (!audio.ctx) return;
    const buffer = audio.ctx.createBuffer(1, Math.floor(audio.ctx.sampleRate * duration), audio.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = audio.ctx.createBufferSource();
    const filter = audio.ctx.createBiquadFilter();
    const gain = audio.ctx.createGain();
    src.buffer = buffer;
    filter.type = filterType;
    filter.frequency.value = freq;
    gain.gain.value = volume;
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.ctx.currentTime + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(target || audio.sfx);
    src.start();
  }

  function playJump() { tone('sine', 220, 0.15, 0.4, 0, 440); }
  function playDoubleJump() { tone('sine', 330, 0.1, 0.35, 0, 660); tone('sine', 440, 0.1, 0.35, 0.05, 880); }

  function playLand() { noiseBurst(0.06, 0.3, 'lowpass', 200); }

    [392, 330, 262, 220, 196].forEach((f, i) => tone('sine', f, 0.2, 0.5 - i * 0.1, i * 0.25));
    triggerGameplayFeedback('fail');
  }
  function playLoseLife() {
    if (audio.ctx) {
      const t = audio.ctx.currentTime;
      const osc = audio.ctx.createOscillator();
      const gain = audio.ctx.createGain();
      const lfo = audio.ctx.createOscillator();
      const lfoGain = audio.ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.linearRampToValueAtTime(200, t + 0.2);
      osc.frequency.linearRampToValueAtTime(300, t + 0.35);
      osc.frequency.linearRampToValueAtTime(100, t + 0.6);
      gain.gain.value = 0.4;
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
      lfo.frequency.value = 8;
      lfoGain.gain.value = 0.12;
      lfo.connect(lfoGain);
      lfoGain.connect(gain.gain);
      osc.connect(gain);
      gain.connect(audio.sfx);
      osc.start(t);
      lfo.start(t);
      osc.stop(t + 0.65);
      lfo.stop(t + 0.65);
    }
    triggerGameplayFeedback('danger');
  }

  function scheduleMusic() {
    if (!audio.ctx || game.mutedMusic) return;
    const stepDur = 0.1;
    const lookAhead = 0.4;
    while (audio.nextMusicNote && audio.nextMusicNote < audio.ctx.currentTime + lookAhead) {
      const step = audio.stepIndex % 16;
      const t = audio.nextMusicNote;
      if (step === 0 || step === 4 || step === 8 || step === 12) triggerBeat(t, 60, 'sine', 0.4, 0.08);
      if (step === 2 || step === 10) triggerBeat(t, 120, 'triangle', 0.25, 0.06);
      if (step === 6 || step === 13 || step === 14) triggerBeat(t, 300, 'triangle', 0.2, 0.04);
      if (step === 0 && audio.motifLoop % 2 === 0) {
        [392, 440, 523, 392].forEach((f, i) => triggerBeat(t + i * 0.3, f, 'triangle', 0.08, 0.22));
      }
      audio.stepIndex++;
      if (audio.stepIndex % 16 === 0) audio.motifLoop++;
      audio.nextMusicNote += stepDur;
    }
  }

  function triggerBeat(t, freq, type, volume, decay) {
    if (!audio.ctx) return;
    const osc = audio.ctx.createOscillator();
    const gain = audio.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + decay);
    osc.connect(gain);
    gain.connect(audio.music);
    osc.start(t);
    osc.stop(t + decay + 0.02);
  }

  function toggleMute() {
    game.mutedMusic = !game.mutedMusic;
    if (audio.music) audio.music.gain.value = game.mutedMusic ? 0 : 0.25;
    Object.values(audio.feedbackPools).forEach((pool) => {
      pool.elements.forEach((el) => {
        el.muted = game.mutedMusic;
        el.volume = game.mutedMusic ? 0 : pool.volume;
      });
    });
  }

  function pushEventBanner(text, color, accent = '#111') {
    const payload = { text, color, accent, life: 0, maxLife: 54 };
    if (game.eventBanner) {
      if (game.eventBannerQueue.length > 2) game.eventBannerQueue.shift();
      game.eventBannerQueue.push(payload);
      return;
    }
    game.eventBanner = payload;
  }

  function triggerGameplayFeedback(group, entryOverride = null) {
    const entry = playFeedbackEntry(group, entryOverride);
    if (!entry) return null;
    pushEventBanner(entry.banner, entry.color);
    return entry;
  }

  function updateEventBanner() {
    if (!game.eventBanner) {
      if (game.eventBannerQueue.length) game.eventBanner = game.eventBannerQueue.shift();
      return;
    }
    game.eventBanner.life++;
    if (game.eventBanner.life >= game.eventBanner.maxLife) {
      game.eventBanner = null;
      if (game.eventBannerQueue.length) game.eventBanner = game.eventBannerQueue.shift();
    }
  }

  function drawEventBanner(c) {
    if (!game.eventBanner) return;
    const banner = game.eventBanner;
    const p = banner.life / banner.maxLife;
    const intro = Math.min(1, p / 0.18);
    const outro = p > 0.72 ? (p - 0.72) / 0.28 : 0;
    const alpha = p < 0.18 ? intro : (p > 0.72 ? 1 - outro : 1);
    const y = lerp(76, 92, intro) - outro * 14;
    const scale = p < 0.18 ? lerp(0.92, 1.02, intro) : (p > 0.72 ? lerp(1, 1.04, outro) : 1);
    c.save();
    c.translate(W / 2, y);
    c.scale(scale, scale);
    c.globalAlpha = alpha;
    const width = Math.max(164, banner.text.length * 14 + 42);
    const panel = c.createLinearGradient(-width / 2, 0, width / 2, 0);
    panel.addColorStop(0, 'rgba(8, 14, 22, 0.9)');
    panel.addColorStop(1, 'rgba(22, 28, 40, 0.82)');
    c.fillStyle = panel;
    c.strokeStyle = hexToRgba(banner.color, 0.8);
    c.lineWidth = 2;
    roundedRect(c, -width / 2, -18, width, 36, 16);
    c.fill();
    c.stroke();
    c.fillStyle = banner.color;
    c.font = '900 18px Arial Black, Arial, sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(banner.text, 0, 1);
    c.restore();
  }

  function roundedRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }

    c.bezierCurveTo(0, 26, 16, 18, 16, 6);
    c.bezierCurveTo(16, -8, 0, -4, 0, 8);
    if (filled) {
      c.fillStyle = '#FF4444';
      c.fill();

      c.beginPath();
      c.arc(-5, 2, 5, 0, Math.PI * 2);

  function drawKangaroo(c, x, y, scale, options = {}) {
    const state = options.state || 'running';
    const frame = options.frame || 0;
    const blink = !!options.blink;
    const hurt = !!options.hurt;
    const sad = !!options.sad;
    const deadAngle = options.deadAngle || 0;
    const hurtTilt = options.hurtTilt || 0;
    const alpha = options.alpha ?? 1;
    const squashX = options.squashX || 1;
    const squashY = options.squashY || 1;
    const idleBreath = options.idleBreath || 0;

    const furMain = '#A97A54';
    const furDark = '#744C31';
    const furLight = '#D2A07A';
    const belly = '#F0D8BE';
    const paw = '#2E1D12';
    const earInner = '#E9B8A6';

    let bob = 0;
    let lean = 0.05;
    let stretch = 1;
    let headLift = 0;
    let tailLift = -0.12;
    let earTilt = 0;
    let nearArm = -0.4;
    let farArm = -0.16;
    let nearLeg = { hip: -0.62, knee: 1.16, foot: 0.18, ox: -10 };
    let farLeg = { hip: -0.22, knee: 0.84, foot: 0.04, ox: -20 };

    if (state === 'running') {
      const cycle = [
        { bob: -3, lean: 0.07, tail: -0.22, nearArm: -0.62, farArm: 0.08, nearLeg: { hip: -0.98, knee: 1.28, foot: 0.18, ox: -6 }, farLeg: { hip: 0.08, knee: 0.52, foot: -0.04, ox: -22 } },
        { bob: 1, lean: 0.03, tail: -0.1, nearArm: -0.3, farArm: -0.08, nearLeg: { hip: -0.56, knee: 0.92, foot: 0.08, ox: -10 }, farLeg: { hip: -0.12, knee: 0.72, foot: 0.02, ox: -20 } },
        { bob: -2, lean: 0.07, tail: -0.2, nearArm: -0.12, farArm: -0.34, nearLeg: { hip: 0.08, knee: 0.48, foot: -0.08, ox: -16 }, farLeg: { hip: -0.9, knee: 1.24, foot: 0.16, ox: -18 } },
        { bob: 1.5, lean: 0.03, tail: -0.06, nearArm: -0.22, farArm: -0.14, nearLeg: { hip: -0.28, knee: 0.82, foot: 0.04, ox: -13 }, farLeg: { hip: -0.32, knee: 0.84, foot: 0.02, ox: -20 } }
      ][frame % 4];
      bob = cycle.bob;
      lean = cycle.lean;
      tailLift = cycle.tail;
      nearArm = cycle.nearArm;
      farArm = cycle.farArm;
      nearLeg = cycle.nearLeg;
      farLeg = cycle.farLeg;
    } else if (state === 'jump') {
      bob = -7;
      lean = options.peak ? -0.02 : -0.08;
      stretch = options.peak ? 1.05 : 1.02;
      headLift = -4;
      tailLift = -0.34;
      nearArm = -1.02;
      farArm = -0.62;
      nearLeg = { hip: -1.06, knee: 1.3, foot: 0.18, ox: -8 };
      farLeg = { hip: -0.86, knee: 1.18, foot: 0.12, ox: -22 };
    } else if (state === 'idle') {
      bob = Math.sin(options.time || 0) * 1.2;
      lean = 0.02;
      tailLift = -0.02;
      earTilt = Math.sin((options.time || 0) * 0.7) * 0.05;
      nearArm = -0.3;
      farArm = -0.12;
      nearLeg = { hip: -0.2, knee: 0.72, foot: 0.04, ox: -12 };
      farLeg = { hip: -0.08, knee: 0.66, foot: 0.02, ox: -22 };
    }

    if (sad) {
      bob = 4;
      lean = 0.11;
      headLift = 3;
      tailLift = 0.15;
      earTilt = -0.12;
      nearArm = 0.18;
      farArm = 0.12;
      nearLeg = { hip: -0.06, knee: 0.6, foot: 0.04, ox: -12 };
      farLeg = { hip: -0.02, knee: 0.6, foot: 0.02, ox: -22 };
    }

    if (hurt) {
      lean += 0.12;
      headLift += 2;
      tailLift += 0.06;
      nearArm += 0.12;
      farArm += 0.08;
    }

    const swingT = batSwingTimer > 0 ? 1 - batSwingTimer / BAT_SWING_DURATION : 0;
    const batSwing = batSwingTimer > 0 ? Math.sin(swingT * Math.PI) * 0.92 : 0;

    c.save();
    c.translate(x, y);
    c.rotate(deadAngle + hurtTilt);
    c.scale(scale * squashX * (1 + idleBreath * 0.3), scale * squashY * (1 - idleBreath * 0.1));
    c.globalAlpha = alpha;
    c.translate(0, bob);
    c.scale(1 / stretch, stretch);
    c.rotate(lean);

    function drawTail() {
      c.save();
      c.translate(-44, -8);
      c.rotate(Math.PI + tailLift);
      c.fillStyle = furMain;
      c.beginPath();
      c.moveTo(0, -9);
      c.bezierCurveTo(-34, -20, -70, -10, -120, 18);
      c.bezierCurveTo(-126, 22, -124, 31, -114, 28);
      c.bezierCurveTo(-74, 16, -30, 18, 2, 10);
      c.closePath();
      c.fill();
      c.fillStyle = furDark;
      c.beginPath();
      c.ellipse(-108, 22, 7, 4, 0.12, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }

    function drawLeg(cfg, back = false) {
      c.save();
      c.translate(cfg.ox, 4);
      c.rotate(cfg.hip);
      c.globalAlpha = alpha * (back ? 0.72 : 1);
      c.fillStyle = back ? furDark : furMain;
      c.beginPath();
      c.ellipse(0, 28, 16, 32, -0.22, 0, Math.PI * 2);
      c.fill();
      c.translate(10, 44);
      c.rotate(cfg.knee);
      c.beginPath();
      c.ellipse(0, 18, 9, 26, 0.18, 0, Math.PI * 2);
      c.fill();
      c.translate(8, 28);
      c.rotate(cfg.foot);
      c.fillStyle = back ? '#493120' : furDark;
      c.beginPath();
      c.moveTo(-8, -4);
      c.lineTo(30, 2);
      c.quadraticCurveTo(38, 4, 34, -4);
      c.lineTo(-2, -10);
      c.closePath();
      c.fill();
      c.fillStyle = paw;
      c.beginPath();
      c.arc(26, 0, 2, 0, Math.PI * 2);
      c.arc(31, 1.2, 1.8, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }

    function drawArm(angle, back = false, withBat = false) {
      c.save();
      c.translate(back ? 14 : 20, -52);
      c.rotate(angle);
      c.globalAlpha = alpha * (back ? 0.72 : 1);
      c.fillStyle = back ? furDark : furMain;
      c.beginPath();
      c.ellipse(0, 10, 6, 14, -0.2, 0, Math.PI * 2);
      c.fill();
      c.translate(0, 18);
      c.rotate(0.18);
      c.beginPath();
      c.ellipse(0, 10, 4.5, 12, 0, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = paw;
      c.beginPath();
      c.ellipse(1, 20, 4.5, 4, 0.1, 0, Math.PI * 2);
      c.fill();
      if (withBat) {
        c.save();
        c.translate(3, 10);
        c.rotate(-0.3 + batSwing);
        const wood = c.createLinearGradient(0, 0, 52, 0);
        wood.addColorStop(0, '#D2A06E');

  // ===== PARTICLE SYSTEM =====
  function emitParticles(originX, originY, count, opts = {}) {
    for (let i = 0; i < count; i++) {
      if (game.particles.length >= MAX_PARTICLES) game.particles.shift();
      const angle = opts.spread ? (opts.dir || -Math.PI / 2) + (Math.random() - 0.5) * opts.spread : Math.random() * Math.PI * 2;
      const speed = rand(opts.minSpeed || 3, opts.maxSpeed || 7);
      const p = {
        x: originX,
        y: originY,
        vx: Math.cos(angle) * speed + (opts.vxJitter || 0),
        vy: Math.sin(angle) * speed,
        radius: rand(opts.minRadius || 3, opts.maxRadius || 7),
        color: (opts.colors || PALETTE)[Math.floor(Math.random() * (opts.colors || PALETTE).length)],
        opacity: opts.opacity || 1,
        startOpacity: opts.opacity || 1,
        gravity: opts.gravity || 0.25,
        life: Math.floor(rand(opts.minLife || 35, opts.maxLife || 50)),
        maxLife: 1
      };
      p.maxLife = p.life;
      game.particles.push(p);
    }
  }

  function updateParticles() {
    for (let i = game.particles.length - 1; i >= 0; i--) {
      const p = game.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.life--;
      p.opacity = (p.life / p.maxLife) * p.startOpacity;
      if (p.life <= 0 || p.opacity <= 0) game.particles.splice(i, 1);
    }
  }

  function drawParticles(c) {
    for (const p of game.particles) {
      c.globalAlpha = Math.max(0, p.opacity);
      c.fillStyle = p.color;
      c.beginPath();
      c.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      c.fill();
    }
    c.globalAlpha = 1;
  }

  // ===== CITY THEME SYSTEM =====
  const CITIES = ['mumbai', 'delhi', 'rajasthan', 'assam', 'chennai'];
  const THEME_CHANGE_DISTANCE = 500;
  let currentTheme = 'mumbai';
  let lastThemeDistance = 0;

  function getWorldTransitionProgress() {
    if (game.transitionTimer <= 0) return 1;
    return clamp(1 - game.transitionTimer / WORLD_TRANSITION_FRAMES, 0, 1);
  }

  function getWorldNightBlend() {
    if (game.transitionTimer <= 0) return game.nightMode ? 1 : 0;
    const progress = smoothstep(getWorldTransitionProgress());
    const fromNight = game.transitionFromNight ? 1 : 0;
    const toNight = game.transitionToNight ? 1 : 0;
    return lerp(fromNight, toNight, progress);
  }

  function getSpawnTheme() {
    return game.transitionTimer > 0 ? game.transitionToTheme : currentTheme;
  }

  function pickNextTheme() {
    const available = CITIES.filter((theme) => theme !== currentTheme);
    return available[Math.floor(Math.random() * available.length)];
  }

  function beginWorldTransition() {
    if (game.transitionTimer > 0) return;
    const nextTheme = pickNextTheme();
    game.transitionTimer = WORLD_TRANSITION_FRAMES;
    game.transitionFromTheme = currentTheme;
    game.transitionToTheme = nextTheme;
    game.transitionFromNight = game.nightMode;
    game.transitionToNight = !game.nightMode;
    game.nightFlash = 120;
    game.floatTexts.push({
      x: W / 2,
      y: 126,
      text: `${nextTheme.toUpperCase()} ${game.transitionToNight ? 'NIGHT' : 'DAY'}`,
      color: game.transitionToNight ? '#8BE9FF' : '#FFD166',
      life: 90,
      maxLife: 90
    });
    emitParticles(W / 2, 122, 18, {
      colors: game.transitionToNight ? ['#8BE9FF', '#DDF6FF', '#7A5CFF'] : ['#FFD166', '#FF9F1C', '#FFF1AE'],
      minRadius: 3,
      maxRadius: 7,
      minSpeed: 2,
      maxSpeed: 6,
      gravity: 0.08,
      minLife: 30,
      maxLife: 52,
      spread: 1.3,
      dir: Math.PI / 2
    });
  }

  function updateWorldTransition() {
    if (game.transitionTimer <= 0) return;
    game.transitionTimer--;
    if (game.transitionTimer <= 0) {
      currentTheme = game.transitionToTheme;
      game.nightMode = game.transitionToNight;
    }
  }

  function maybeRotateWorldTheme() {
    const dist = Math.floor(game.distance);
    if (game.transitionTimer > 0) return;
    if (dist - lastThemeDistance < THEME_CHANGE_DISTANCE) return;
    lastThemeDistance += THEME_CHANGE_DISTANCE;
    beginWorldTransition();
  }

  function getCurrentTheme() {
    const dist = Math.floor(game.distance);
    if (dist - lastThemeDistance >= THEME_CHANGE_DISTANCE) {
      lastThemeDistance = dist - (dist % THEME_CHANGE_DISTANCE);
      const available = CITIES.filter(t => t !== currentTheme);
      currentTheme = available[Math.floor(Math.random() * available.length)];
      game.floatTexts.push({
        x: W / 2, y: 140,
        text: `📍 WELCOME TO ${currentTheme.toUpperCase()}!`,
        color: '#FFD700',
        life: 90, maxLife: 90
      });
    }
    return currentTheme;
  }

    const nightBlend = getWorldNightBlend();
    const progress = smoothstep(getWorldTransitionProgress());
    c.save();
    if (game.transitionTimer > 0) {
      c.globalAlpha = 0.72 * (1 - progress);
      drawThemeScenery(c, game.transitionFromTheme, nightBlend);
      c.globalAlpha = 0.72 * progress;
      drawThemeScenery(c, game.transitionToTheme, nightBlend);
    } else {
      c.globalAlpha = 0.72;
      drawThemeScenery(c, currentTheme, nightBlend);
    }
    c.restore();
  }

  // ===== BAT SWING STATE =====
  let batSwingTimer = 0;

  // ===== PLAYER (KANGAROO) =====
  function resetPlayer() {
    player.y = GROUND_Y;
    player.vy = 0;
    player.onGround = true;
    player.doubleJumpUsed = false;
    player.jumpHoldFrames = 0;
    player.hurtTimer = 0;
    player.deadTimer = 0;
    player.squashTimer = 0;
    player.deadAngle = 0;
    player.hurtTilt = 0;
  }

  function jump() {
    if (game.state !== STATES.PLAYING) return;
    if (player.onGround) {
      player.vy = -18.6;
      player.onGround = false;
      player.jumpHoldFrames = 8;
      player.squashTimer = 6;
      playJump();
    } else if (!player.doubleJumpUsed) {
      player.vy = -16.8;
      player.doubleJumpUsed = true;
      player.jumpHoldFrames = 6;
      emitParticles(player.x + 30, player.y + 6, 8, { colors: ['#FFD700', '#FFFFFF', '#FF6B00'], minRadius: 2, maxRadius: 5, minSpeed: 2, maxSpeed: 5, gravity: 0.1, minLife: 20, maxLife: 30, spread: 1.4, dir: -Math.PI / 2 });
      playDoubleJump();
    }
  }

  function hurtPlayer() {
    if (player.hurtTimer > 0 || game.state !== STATES.PLAYING) return;
    game.lives--;
    player.hurtTimer = 90;
    player.hurtTilt = -0.34;
    player.squashTimer = 14;
    if (player.onGround) {
      player.vy = -4.2;
      player.onGround = false;
    } else {
      player.vy = Math.min(player.vy, -2.8);
    }
    game.screenShake = 38;
    game.redFlash = 18;
    emitParticles(player.x + 12, player.y - 48, 16, {
      colors: ['#FF6B6B', '#FFD166', '#FFFFFF'],
      minRadius: 2,
      maxRadius: 6,
      minSpeed: 2,
      maxSpeed: 7,
      gravity: 0.18,
      minLife: 24,
      maxLife: 38
    });
    if (game.lives <= 0) triggerGameOver();
    else playLoseLife();
  }

  function triggerGameOver() {
    if (game.state === STATES.GAME_OVER) return;
    game.prevState = game.state;
    game.state = STATES.GAME_OVER;
    game.gameOverTimer = 0;
    player.deadTimer = 72;
    emitParticles(player.x + 10, player.y - 60, 40, { colors: ['#ff4444', '#FF6B00', '#FFD700'], minSpeed: 2, maxSpeed: 10, gravity: 0.3, minLife: 60, maxLife: 80 });
    playGameOverMelody();
    if (game.distance > game.highScore) {
      game.highScore = game.distance;
      game.newHighScore = true;
      localStorage.setItem(STORAGE_KEY, String(game.highScore));
    }
  }

  function updatePlayer() {
    player.blinkTimer--;
    if (player.blinkTimer <= 0) {
      player.blinkFrame = 3;
      player.blinkTimer = 180 + Math.floor(Math.random() * 90);
    }
    if (player.blinkFrame > 0) player.blinkFrame--;

    if (game.state === STATES.SPLASH) {
      player.splashHopTimer++;
      if (player.splashHopTimer > 210) {
        player.splashHopTimer = 0;
        player.splashHop = 1;
      }
      if (player.splashHop > 0) player.splashHop += 1;
      if (player.splashHop > 30) player.splashHop = 0;
      return;
    }

    if (game.state === STATES.GAME_OVER) {
      if (player.deadTimer > 0) {
        const t = 1 - player.deadTimer / 72;
        player.deadAngle = Math.min(Math.PI / 2, easeInCubic(Math.min(1, t * 1.4)) * (Math.PI / 2));
        if (t > 0.42) player.y += 12 * easeInCubic((t - 0.42) / 0.58);
        player.deadTimer--;
      }
      return;
    }

    if (player.hurtTimer > 0) player.hurtTimer--;
    player.hurtTilt *= player.hurtTimer > 0 ? 0.9 : 0.74;
    if (player.squashTimer > 0) player.squashTimer--;
    if (!player.onGround) {
      if (game.inputHold && player.jumpHoldFrames > 0) {
        player.vy -= 0.15;
        player.jumpHoldFrames--;
      }
      player.vy = Math.min(player.vy + 0.78, 18);
      player.y += player.vy;
      if (player.y >= GROUND_Y) {
        player.y = GROUND_Y;
        if (!player.onGround) {
          const hardLanding = Math.abs(player.vy) > 13;
          emitParticles(player.x + 10, GROUND_Y + 2, hardLanding ? 9 : 6, { colors: ['rgba(180,150,100,0.8)'], minRadius: 3, maxRadius: 8, minSpeed: 2, maxSpeed: 4, gravity: 0.15, minLife: 20, maxLife: 28 });
          player.squashTimer = hardLanding ? 16 : 12;
          if (hardLanding) game.screenShake = Math.max(game.screenShake, 10);
          playLand();
        }
        player.vy = 0;
        player.onGround = true;
        player.doubleJumpUsed = false;
        player.jumpHoldFrames = 0;
      }
    }
  }

  function playerCollisionBox() {
    return { x: player.x - 13, y: player.y - 58, w: 34, h: 56 };
  }

  // ===== OBSTACLES =====
  function getPooled(poolName) {
    const pool = pools[poolName];
    let obj = pool.find((it) => !it.active);
    if (!obj) {
      obj = { active: false };
      pool.push(obj);
    }
    obj.active = true;
    return obj;
  }

  function weightedPick(list) {
    const total = list.reduce((s, item) => s + item.weight, 0);
    let r = Math.random() * total;
    for (const item of list) {
      r -= item.weight;
      if (r <= 0) return item;
    }
    return list[list.length - 1];
  }

  function getObstacleDifficultyStyle(ob) {
    const styles = {
      easy: {
        shadowColor: '#FFD166',
        auraColor: 'rgba(255,209,102,0.16)',
        pipColor: '#FFF0BF',
        pipCount: 1,
        outlineWidth: 1.5
      },
      medium: {
        shadowColor: '#FF9F43',
        auraColor: 'rgba(255,159,67,0.2)',
        pipColor: '#FFE3C3',
        pipCount: 2,
        outlineWidth: 2
      },
      hard: {
        shadowColor: '#FF4D6D',
        auraColor: 'rgba(255,77,109,0.24)',
        pipColor: '#FFD9E1',
        pipCount: 3,
        outlineWidth: 2.5
      }
    };
    return styles[ob.difficulty] || styles.medium;
  }

  function getNextObstacleGap(ob) {
    const base = Math.max(360, 500 - (game.level - 1) * 24);
    if (ob.difficulty === 'easy') return base + rand(90, 150);
    if (ob.difficulty === 'hard') return base + rand(220, 300);
    return base + rand(150, 220);
  }

  function drawObstacleTelegraph(c, ob, style) {
    const flash = ob.flashTimer > 0 ? ob.flashTimer / 18 : 0;
    const pulse = 0.82 + Math.sin((game.frame + ob.t) * 0.18) * 0.08;
    const centerX = ob.x + ob.w * 0.5;
    const markerY = ob.y - ob.h - 16;
    c.save();
    c.globalAlpha = 0.7 + flash * 0.2;
    c.fillStyle = style.auraColor;
    c.beginPath();
    c.ellipse(centerX, ob.y + 4, ob.w * (0.52 + flash * 0.06), 7 + style.pipCount, 0, 0, Math.PI * 2);
    c.fill();
    c.globalAlpha = 0.88;
    c.fillStyle = style.pipColor;
    for (let i = 0; i < style.pipCount; i++) {
      const x = centerX + (i - (style.pipCount - 1) / 2) * 12;
      roundedRect(c, x - 4, markerY + (i % 2), 8, 4, 2);
      c.fill();
    }
    c.globalAlpha = 0.45 + flash * 0.35;
    c.strokeStyle = style.shadowColor;
    c.lineWidth = style.outlineWidth;
    c.beginPath();
    c.moveTo(centerX - ob.w * 0.26 * pulse, ob.y + 8);
    c.lineTo(centerX + ob.w * 0.26 * pulse, ob.y + 8);
    c.stroke();
    c.restore();
  }

  function spawnObstacle(chain = false) {
    const city = getSpawnTheme();
    const filteredDefs = OBSTACLE_DEFS.filter(d => d.cities === 'all' || d.cities === city);
    const def = weightedPick(filteredDefs);
    const ob = getPooled('obstacles');
    const awakeDog = game.level >= 4 && def.type === 'dog' && Math.random() < 0.08;
    ob.type = def.type;
    ob.x = W + 20;
    ob.y = GROUND_Y;
    ob.w = awakeDog ? 80 : def.width;
    ob.h = awakeDog ? 30 : def.height;
    ob.visualW = def.visualW;
    ob.visualH = awakeDog ? 34 : def.visualH;
    ob.difficulty = def.difficulty;
    ob.drawScale = def.drawScale || 1;
    ob.yOffset = def.yOffset || 0;
    ob.awake = awakeDog;
    ob.t = 0;
    ob.nearMissed = false;
    ob.passed = false;
    ob.flashTimer = 0;
    game.obstacles.push(ob);
    void chain;
    return ob;
  }

  function spawnChainedObstacle(gap) {
    const def = weightedPick(OBSTACLE_DEFS);
    const ob = getPooled('obstacles');
    const last = game.obstacles[game.obstacles.length - 1];
    ob.type = def.type;
    ob.x = last.x + gap;
    ob.y = GROUND_Y;
    ob.w = def.width;
    ob.h = def.height;
    ob.visualW = def.visualW;
    ob.visualH = def.visualH;
    ob.awake = false;
    ob.t = 0;
    ob.nearMissed = false;
    ob.passed = false;
    game.obstacles.push(ob);
  }

  function updateObstacles() {
    const speed = game.worldSpeed;
    game.nextObstacleIn -= speed;
    const obstacleVisible = game.obstacles.some((ob) => ob.x + ob.w > 0 && ob.x < W);
    if (game.nextObstacleIn <= 0) {
      if (obstacleVisible) {
        game.nextObstacleIn = 24;
      } else {
        const spawned = spawnObstacle(false);
        game.nextObstacleIn = getNextObstacleGap(spawned);
      }
    }
    const pBox = playerCollisionBox();
    for (let i = game.obstacles.length - 1; i >= 0; i--) {
      const ob = game.obstacles[i];
      ob.t++;
      if (ob.flashTimer > 0) ob.flashTimer--;
      ob.x -= speed;
      if (!ob.passed && ob.x + ob.w < pBox.x) {
        ob.passed = true;
        game.dodgeCount++;
        if (game.dodgeCount % 6 === 0) {
          triggerGameplayFeedback('dodge6');
        }
      }
      if (!ob.nearMissed && ob.x + ob.w < pBox.x && Math.abs((ob.x + ob.w) - pBox.x) < 30) {
        ob.nearMissed = true;
        ob.flashTimer = 18;
        triggerSlangBurst(SLANGS.BAAP, null, null, true);
        playNearMiss();
      }
      if (rectOverlap(pBox.x, pBox.y, pBox.w, pBox.h, ob.x, ob.y - ob.h, ob.w, ob.h)) {
        hurtPlayer();
      }
      if (ob.x < -200) {
        ob.active = false;
        game.obstacles.splice(i, 1);
      }
    }
  }

  function drawObstacle(c, ob) {
    c.save();
    const night = isNightMode();
    const style = getObstacleDifficultyStyle(ob);
    const flash = ob.flashTimer > 0 ? ob.flashTimer / 18 : 0;
    drawObstacleTelegraph(c, ob, style);
    c.shadowBlur = 10 + style.pipCount * 2 + flash * 5;
    c.shadowColor = flash > 0.1 ? '#FFFFFF' : (night ? style.pipColor : style.shadowColor);
    const drawY = ob.y + ob.yOffset;
    const drawScale = ob.drawScale * (1 + flash * 0.04);
    if (ob.type === 'rickshaw') {
      drawRickshaw(c, ob.x + ob.visualW * 0.52, drawY, drawScale, { smoke: (ob.t % 30) / 30, facing: -1 });
    } else if (ob.type === 'bicycle') {
      drawBicycleVendor(c, ob.x + ob.visualW * 0.52, drawY, -drawScale);
    } else if (ob.type === 'dog') {
      const twitch = ob.awake ? 1 : (ob.t % 120 < 4 ? 1.02 : 1);
      drawDog(c, ob.x + ob.visualW * 0.45, drawY, drawScale, { awake: ob.awake, twitch });
    } else if (ob.type === 'cylinder') {
      drawGasCylinder(c, ob.x + ob.visualW * 0.5, drawY, drawScale);
    } else if (ob.type === 'tiffin') {
      drawTiffinCarrier(c, ob.x + ob.visualW * 0.5, drawY, drawScale);
    } else if (ob.type === 'dhol') {
      drawDhol(c, ob.x + ob.visualW * 0.5, drawY, drawScale);

      drawTaxi(c, ob.x + ob.visualW * 0.5, drawY, drawScale, { smoke: (ob.t % 30) / 30 });
    } else if (ob.type === 'camel') {
      drawCamel(c, ob.x + ob.visualW * 0.4, drawY, drawScale);

  // ===== COLLECTIBLES =====
  function spawnCollectible(defOverride = null) {
    const def = defOverride || weightedPick(COLLECTIBLE_DEFS);
    const col = getPooled('collectibles');
    const heights = def.type === 'worldcup' ? [430, 462] : [540, 480, 400];
    col.type = def.type;
    col.score = def.score;
    col.slang = def.slang;
    col.x = W + rand(0, 70);
    col.baseY = heights[Math.floor(Math.random() * heights.length)];
    col.y = col.baseY;
    col.t = Math.random() * Math.PI * 2;
    col.collected = false;
    col.w = def.type === 'garland' ? 60 : (def.type === 'chai' ? 32 : (def.type === 'worldcup' ? 42 : 44));
    col.h = def.type === 'garland' ? 22 : (def.type === 'worldcup' ? 54 : 36);
    if (game.obstacles.some((o) => Math.abs(o.x - col.x) < 60)) {
      col.active = false;
      return false;
    }
    game.collectibles.push(col);
    return true;
  }

  function spawnWorldCupCollectible() {
    if (game.collectibles.some((col) => col.type === 'worldcup')) return;
    spawnCollectible(WORLD_CUP_DEF);
  }

  function updateCollectibles() {
    const speed = game.worldSpeed;
    while (game.distance >= game.nextWorldCupAt) {
      spawnWorldCupCollectible();
      game.nextWorldCupAt += WORLD_CUP_INTERVAL;
    }
    const collectibleVisible = game.collectibles.some((col) => col.x + col.w / 2 > 0 && col.x - col.w / 2 < W);
    game.nextCollectibleIn -= speed;
    if (game.nextCollectibleIn <= 0) {
      if (collectibleVisible) {
        game.nextCollectibleIn = 40;
      } else {
        spawnCollectible();
        game.nextCollectibleIn = rand(240, 360);
      }
    }
    const pBox = playerCollisionBox();
    const batBox = { x: pBox.x + pBox.w - 4, y: pBox.y + 10, w: 46, h: 30 };
    for (let i = game.collectibles.length - 1; i >= 0; i--) {
      const col = game.collectibles[i];
      col.x -= speed;
      col.t += col.type === 'coin' ? 0.08 : 0.09;
      const bob = col.type === 'ball' ? 3.5 : (col.type === 'garland' ? 4 : (col.type === 'worldcup' ? 5.5 : 4.5));
      col.y = col.baseY + Math.sin(col.t) * bob;
      if (
        rectOverlap(pBox.x, pBox.y, pBox.w, pBox.h, col.x - col.w / 2, col.y - col.h / 2, col.w, col.h) ||
        rectOverlap(batBox.x, batBox.y, batBox.w, batBox.h, col.x - col.w / 2, col.y - col.h / 2, col.w, col.h)
      ) {
        collectItem(col, i);
      } else if (col.x < -80) {
        col.active = false;
        game.collectibles.splice(i, 1);
      }
    }
  }

  function getCollectibleBurstStyle(col) {
    if (col.type === 'ball') return { count: 10, colors: ['#CC0000', '#FFD700', '#FFFFFF'] };
    if (col.type === 'coin') return { count: 8, colors: ['#FFD700', '#FFF6C9', '#FFFFFF'] };
    if (col.type === 'garland') return { count: 7, colors: ['#FF8C00', '#FFD700', '#2AAF58'] };
    if (col.type === 'worldcup') return { count: 16, colors: ['#FFD24D', '#FFF4B2', '#8BE9FF', '#1746A2'] };
    return { count: 6, colors: ['#FF6B00', '#FFD700', '#FFFFFF'] };
  }

  function collectItem(col, index) {
    const burst = getCollectibleBurstStyle(col);
    playCollect(col.type === 'worldcup' ? 'worldcup' : 'reward');
    batSwingTimer = BAT_SWING_DURATION;
    game.batImpactTimer = col.type === 'worldcup' ? 15 : 10;
    game.batImpactX = col.x;
    game.batImpactY = col.y;
    game.score += col.score;
    game.combo += 1;
    game.slangUnique.add(col.slang.text);
    if (!game.slangCollectedRun.includes(col.slang.text)) game.slangCollectedRun.push(col.slang.text);
    game.floatTexts.push({
      x: col.x,
      y: col.y,
      text: col.type === 'worldcup' ? 'WORLD CUP' : 'BAT HIT',
      color: col.type === 'worldcup' ? '#8BE9FF' : '#FFD700',
      life: col.type === 'worldcup' ? 60 : 48,
      maxLife: col.type === 'worldcup' ? 60 : 48
    });
    emitParticles(col.x, col.y, burst.count, { colors: burst.colors, minRadius: 2, maxRadius: 6, minSpeed: 2, maxSpeed: 6, gravity: 0.22, minLife: 28, maxLife: 42 });
    triggerSlangBurst(col.slang, col.x, col.y, false);
    if (game.combo === 3) triggerSlangBurst(SLANGS.COMBO3, col.x, col.y, false, true);
    if (game.combo === 5) {
      triggerSlangBurst(SLANGS.COMBO5, col.x, col.y, false, true);
      emitParticles(col.x, col.y, 16, { colors: ['#FFD700', '#FF6B00', '#FFFFFF'], minRadius: 2, maxRadius: 7, minSpeed: 2, maxSpeed: 7, gravity: 0.16, minLife: 24, maxLife: 38 });
    }
    col.active = false;
    game.collectibles.splice(index, 1);
  }

  function drawCollectible(c, col) {
    c.save();
    const night = isNightMode();
    c.globalAlpha = 0.18;
    c.fillStyle = 'rgba(0,0,0,0.85)';
    c.beginPath();
    c.ellipse(col.x, col.y + col.h * 0.32, col.w * 0.26, 5, 0, 0, Math.PI * 2);
    c.fill();
    c.globalAlpha = 1;
    c.shadowBlur = 12;
    c.shadowColor = night ? '#8BE9FF' : (col.slang.color || '#fff');
    if (night) {
      c.strokeStyle = 'rgba(139,233,255,0.78)';
      c.lineWidth = 2;
      c.beginPath();
      c.ellipse(col.x, col.y, col.w * 0.48 + 8, col.h * 0.48 + 8, 0, 0, Math.PI * 2);
      c.stroke();
    }
    if (col.type === 'vada') drawVadaPav(c, col.x, col.y, 1, { time: (game.frame % 96) / 96 });
    if (col.type === 'chai') drawChaiCup(c, col.x, col.y, 1, { time: (game.frame % 96) / 96 });
    if (col.type === 'ball') drawCricketBall(c, col.x, col.y, 1);
    if (col.type === 'garland') drawGarland(c, col.x, col.y, 1, { sway: Math.sin(col.t) * 0.05 });
    if (col.type === 'coin') drawRupeeCoin(c, col.x, col.y, 1, game.frame * 0.08);
    if (col.type === 'worldcup') drawWorldCup(c, col.x, col.y, 1, { pulse: Math.sin(col.t) * 0.5 + 0.5 });
    c.restore();
  }

  function drawBatImpact(c) {
    if (game.batImpactTimer <= 0) return;
    const t = game.batImpactTimer / 15;
    c.save();
    c.translate(game.batImpactX, game.batImpactY);
    c.globalAlpha = t;
    c.strokeStyle = '#FFF2A6';
    c.lineWidth = 3;
    for (let i = 0; i < 4; i++) {
      c.rotate(0.55);
      c.beginPath();
      c.moveTo(0, -2);
      c.lineTo(18 + (1 - t) * 12, -12);
      c.stroke();
    }
    c.fillStyle = `rgba(255, 255, 255, ${0.28 * t})`;
    c.beginPath();
    c.arc(0, 0, 18 - t * 6, 0, Math.PI * 2);
    c.fill();
    c.restore();
  }

  // ===== SLANG BURST SYSTEM =====
  function triggerSlangBurst(slang, x, y, skipParticles = false, noSound = false) {
    const payload = { slang, x, y, timer: 0, skipParticles, noSound, sparkles: Array.from({ length: 4 }, () => ({
      ox: rand(-60, 60),
      oy: rand(-40, 40),
      size: rand(12, 18)
    })) };
    if (game.currentSlangBurst) {
      game.slangQueue.push(payload);
      return;
    }
    game.currentSlangBurst = payload;
    game.flashColor = slang.color;
    if (!skipParticles && x !== null && y !== null) emitParticles(x, y, 10, { colors: PALETTE, minRadius: 4, maxRadius: 8, minSpeed: 4, maxSpeed: 8, gravity: 0.3, minLife: 20, maxLife: 30 });
    if (!noSound) playSlang();
  }

  function updateSlangBurst() {
    if (!game.currentSlangBurst) {
      if (game.slangQueue.length) {
        game.currentSlangBurst = game.slangQueue.shift();
        game.flashColor = game.currentSlangBurst.slang.color;
        if (!game.currentSlangBurst.noSound) playSlang();
      }
      return;
    }
    game.currentSlangBurst.timer++;
    if (game.currentSlangBurst.timer > 120) {
      game.currentSlangBurst = null;
      if (game.slangQueue.length) {
        game.currentSlangBurst = game.slangQueue.shift();
        game.flashColor = game.currentSlangBurst.slang.color;
        if (!game.currentSlangBurst.noSound) playSlang();
      }
    }
  }

  function drawSlangBurst(c) {
    if (!game.currentSlangBurst) return;
    const sb = game.currentSlangBurst;
    const t = sb.timer / 60;
    let scale = 1;
    let alpha = 1;
    let yOffset = 0;
    if (t < 0.12) {
      const p = t / 0.12;
      scale = lerp(0, 1.1, overshoot(p));
      alpha = p;
    } else if (t < 0.2) {
      const p = (t - 0.12) / 0.08;
      scale = lerp(1.1, 1, p);
      alpha = 1;
    } else if (t < 1.1) {
      scale = 1;
    } else {
      const p = Math.min(1, (t - 1.1) / 0.4);
      scale = lerp(1, 1.1, p);
      alpha = 1 - p;
      yOffset = -30 * p;
    }
    if (sb.timer < 5 && game.flashColor) {
      c.fillStyle = hexToRgba(game.flashColor, 0.15);
      c.fillRect(0, 0, W, H);
    }
    c.save();
    c.translate(W / 2, 380 + yOffset);
    c.scale(scale, scale);
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.globalAlpha = alpha;
    for (const sp of sb.sparkles) drawSparkle(c, sp.ox, sp.oy, sp.size, sb.slang.color, alpha * 0.95);
    c.shadowColor = '#000';
    c.shadowOffsetX = 4;
    c.shadowOffsetY = 4;
    c.lineWidth = 4;
    c.strokeStyle = '#000';
    c.fillStyle = sb.slang.color;
    c.font = '900 54px Impact, Arial Black, sans-serif';
    c.strokeText(sb.slang.text, 0, 0);
    c.fillText(sb.slang.text, 0, 0);
    c.shadowOffsetX = 0;
    c.shadowOffsetY = 0;
    if (sb.timer > 6) {
      c.font = 'bold 18px Arial';
      c.fillStyle = '#fff';
      c.strokeStyle = '#000';
      c.lineWidth = 3;
      c.strokeText(`= ${sb.slang.meaning}`, 0, 50);
      c.fillText(`= ${sb.slang.meaning}`, 0, 50);
    }
    c.restore();
    c.globalAlpha = 1;
  }

  // ===== UI DRAWING =====
  function drawTopBar(c) {
    c.fillStyle = 'rgba(0,0,0,0.55)';
    c.fillRect(0, 0, W, 60);
    const lostHeartAnim = game.state === STATES.PLAYING && player.hurtTimer > 0 ? 1 + Math.sin(game.frame * 0.5) * 0.25 : 1;
    for (let i = 0; i < 3; i++) {
      const filled = i < game.lives;
      const anim = (!filled && i === game.lives && player.hurtTimer > 60) ? lostHeartAnim : 1;
      drawHeart(c, 27 + i * 34, 14, 0.62, filled, anim);
    }
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillStyle = '#fff';
    c.shadowColor = '#000';
    c.shadowOffsetX = 3;
    c.shadowOffsetY = 3;
    c.font = '36px Impact, Arial Black, sans-serif';
    c.fillText(`${Math.floor(game.distance)}m`, W / 2, 32);
    c.shadowOffsetX = 0;
    c.shadowOffsetY = 0;
    c.font = 'bold 18px Arial';
    c.textAlign = 'right';
    c.fillText(`🗣 ${game.slangUnique.size}`, 326, 46);
    drawPauseIcon(c, 362, 28);
    drawSpeaker(c, 361, 58, game.mutedMusic);
  }

  function drawProgressBar(c) {
    const level = LEVELS[game.level - 1];
    const nextMax = level.max === Infinity ? game.score + 300 : level.max + 1;
    const pct = clamp((game.score - level.min) / (nextMax - level.min), 0, 1);
    c.fillStyle = '#333';
    c.fillRect(0, 836, W, 8);
    const pulse = game.milestonePulse > 0 ? 2 : 0;
    const g = c.createLinearGradient(0, 0, W, 0);
    g.addColorStop(0, '#FF6B00');
    g.addColorStop(1, '#FFD700');
    c.fillStyle = g;
    c.fillRect(0, 836 - pulse, W * pct, 8 + pulse);
  }

  function drawFloatingTexts(c) {
    c.font = 'bold 20px Arial';
    c.textAlign = 'center';
    for (const t of game.floatTexts) {
      c.globalAlpha = t.life / t.maxLife;
      c.fillStyle = t.color;
      c.fillText(t.text, t.x, t.y);
    }
    c.globalAlpha = 1;
  }

  // ===== SCREENS (SPLASH, COUNTDOWN, GAME OVER, PAUSE) =====
  function drawSplash(c) {
    drawWorld(c, false, true);

    c.save();
    c.fillStyle = 'rgba(10, 20, 40, 0.34)';
    c.fillRect(0, 0, W, H);

    c.translate(W / 2, 224);
    c.textAlign = 'center';
    c.textBaseline = 'middle';

    c.font = '800 62px "Trebuchet MS", Arial, sans-serif';
    c.shadowColor = 'rgba(0,0,0,0.6)';
    c.shadowBlur = 15;
    c.shadowOffsetY = 6;
    const gradient = c.createLinearGradient(0, -30, 0, 30);
    gradient.addColorStop(0, '#FFB75E');
    gradient.addColorStop(1, '#ED8F03');
    c.fillStyle = gradient;
    c.fillText('KANGAROO', 0, -30);
    c.font = '800 52px "Trebuchet MS", Arial, sans-serif';
    c.fillText('RUN', 0, 30);
    c.restore();

    const breath = Math.sin(game.splashTimer / 30) * 0.02;
    let hopOffset = 0;
    let squashX = 1;
    let squashY = 1;
    if (player.splashHop > 0) {
      const p = player.splashHop / 30;
      hopOffset = Math.sin(p * Math.PI) * 40;
      if (p < 0.25) { squashX = 1.08; squashY = 0.92; }
      else if (p > 0.75) { squashX = 1.12; squashY = 0.88; }
      else { squashX = 0.95; squashY = 1.08; }
    }
    drawKangaroo(c, W / 2, 566 - hopOffset, 1.15, { state: 'idle', idleBreath: breath, blink: player.blinkFrame > 0, squashX, squashY, time: game.splashTimer / 35 });

    const pulse = 1 + Math.sin(game.splashTimer / 18) * 0.04;
    drawButton(c, BUTTONS.splashStart, 'TAP TO START', '#FF7E5F', '#FEB47B', pulse);

    c.font = 'bold 16px Arial';
    c.textAlign = 'center';
    c.fillStyle = 'rgba(255,255,255,0.9)';
    c.fillText(`BEST RECORD: ${Math.floor(game.highScore)}m`, W / 2, 770);
  }

  function drawCountdown(c) {
    drawWorld(c, false, false, 0.45);
    c.fillStyle = 'rgba(0,0,0,0.5)';
    c.fillRect(0, 0, W, H);
    const entries = [
      { text: '3', color: '#FF4444' },
      { text: '2', color: '#FFD700' },
      { text: '1', color: '#FF6B00' },
      { text: 'GO!', color: '#00FF88' }
    ];
    const current = entries[game.countdownStage] || entries[3];
    let scale = 1;
    let alpha = 1;
    if (game.countdownStage < 3) {
      if (game.countdownTime < 24) scale = lerp(2, 1, game.countdownTime / 24);
      else if (game.countdownTime < 42) scale = 1;
      else scale = lerp(1, 0, (game.countdownTime - 42) / 18);
      alpha = game.countdownTime < 42 ? 1 : 1 - (game.countdownTime - 42) / 18;
    } else {
      scale = game.countdownTime < 18 ? lerp(1, 1.5, game.countdownTime / 18) : 1.5;
      alpha = 1 - Math.max(0, (game.countdownTime - 18) / 12);
    }
    c.save();
    c.translate(W / 2, H / 2);
    c.scale(scale, scale);
    c.globalAlpha = alpha;
    c.fillStyle = current.color;
    c.strokeStyle = '#000';
    c.lineWidth = 6;
    c.font = '140px Impact, Arial Black, sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.strokeText(current.text, 0, 0);
    c.fillText(current.text, 0, 0);
    c.restore();
    c.globalAlpha = 1;
  }

  function drawPaused(c) {
    drawWorld(c, true, false);
    c.fillStyle = 'rgba(0,0,0,0.72)';
    c.fillRect(0, 0, W, H);
    c.textAlign = 'center';
    c.fillStyle = '#fff';
    c.strokeStyle = '#000';
    c.lineWidth = 4;
    c.font = '56px Impact, Arial Black, sans-serif';
    c.strokeText('PAUSED', W / 2, 330);
    c.fillText('PAUSED', W / 2, 330);
    drawButton(c, BUTTONS.pausedResume, 'RESUME', '#FF6B00', '#FF9100', 1);
    drawButton(c, BUTTONS.pausedQuit, 'QUIT', '#555', '#3A3A3A', 1, true);
  }

  function drawGameOver(c) {
    drawWorld(c, false, false, 0.6); // Added overlay alpha for cleaner popup read
    const timer = game.gameOverTimer;
    if (timer < 72) return;
    const p = clamp((timer - 72) / 36, 0, 1);
    const bounce = easeOutBounce(p);
    const panelY = lerp(-600, 180, bounce);

    c.save();
    c.translate(45, panelY);
    
    // Premium backplate
    c.fillStyle = 'rgba(12, 18, 28, 0.9)';
    c.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    c.lineWidth = 1;
    c.shadowColor = 'rgba(0,0,0,0.5)';
    c.shadowBlur = 30;
    c.shadowOffsetY = 10;
    roundedRect(c, 0, 0, 300, 460, 20);
    c.fill();
    c.stroke();
    c.shadowBlur = 0;
    c.shadowOffsetY = 0;
    
    c.translate(150, 0);

    // Premium glowing Game Over header
    c.font = '800 42px "Inter", Arial, sans-serif';
    c.textAlign = 'center';
    const tg = c.createLinearGradient(0, 30, 0, 60);
    tg.addColorStop(0, '#FF4B2B');
    tg.addColorStop(1, '#FF416C');
    c.fillStyle = tg;
    c.shadowColor = 'rgba(255, 75, 43, 0.4)';
    c.shadowBlur = 15;
    c.fillText('GAME OVER', 0, 55);
    c.shadowBlur = 0;

    // Minimal sad Kangaroo
    drawKangaroo(c, 0, 150, 0.9, { sad: true });

    if (game.newHighScore) {
      c.fillStyle = '#FFD700';
      c.font = 'bold 14px Arial';
      c.letterSpacing = '1px';
      c.fillText('★ NEW BEST DISTANCE ★', 0, 200);
      c.letterSpacing = '0px';
    }

    // Clean Stats
    c.fillStyle = 'rgba(255,255,255,0.5)';
    c.font = '600 12px Arial';
    c.letterSpacing = '2px';
    c.fillText('DISTANCE', 0, 235);
    
    c.fillStyle = '#FFFFFF';
    c.font = '800 48px Arial';
    c.letterSpacing = '0px';
    c.fillText(`${Math.floor(game.distance)}m`, 0, 275);

    c.fillStyle = 'rgba(255,255,255,0.5)';
    c.font = '600 12px Arial';
    c.letterSpacing = '2px';
    c.fillText('BEST DISTANCE', 0, 325);

    c.fillStyle = '#FFFFFF';
    c.font = '700 24px Arial';
    c.letterSpacing = '0px';
    c.fillText(`${Math.floor(game.highScore)}m`, 0, 355);

    c.restore();

    // The buttons have been moved in BUTTONS state to y: 556
    drawButton(c, BUTTONS.overPlay, 'PLAY AGAIN', '#FF7E5F', '#FEB47B');
    drawButton(c, BUTTONS.overMenu, 'MAIN MENU', '#444', '#555', 1, true);
  }

  // ===== GAME LOOP =====
  function resizeCanvas() {
    const vv = window.visualViewport;
    dpr = Math.min(MAX_RENDER_DPR, Math.max(1, window.devicePixelRatio || 1));
    const ww = Math.round(vv ? vv.width : window.innerWidth);
    const wh = Math.round(vv ? vv.height : window.innerHeight);
    canvas.width = ww * dpr;
    canvas.height = wh * dpr;
    canvas.style.width = `${ww}px`;
    canvas.style.height = `${wh}px`;
  }

  function resetRun(startFromMenu = false) {
    game.score = 0;
    game.distance = 0;
    game.lives = 3;
    game.level = 1;
    game.speedMult = LEVELS[0].mult;
    game.worldSpeed = BASE_SCROLL_SPEED * LEVELS[0].mult;
    game.screenShake = 0;
    game.redFlash = 0;
    game.levelFlash = 0;
    game.levelUpTimer = 0;
    game.milestonePulse = 0;
    game.flashColor = null;
    game.combo = 0;
    game.nextWorldCupAt = WORLD_CUP_INTERVAL;
    game.nextObstacleIn = 460;
    game.nextCollectibleIn = 300;
    game.obstacles.length = 0;
    game.collectibles.length = 0;
    game.particles.length = 0;
    game.floatTexts.length = 0;
    game.slangUnique = new Set();
    game.slangCollectedRun = [];
    game.scoreMilestone = 500;
    game.currentSlangBurst = null;
    game.slangQueue.length = 0;
    game.gameOverTimer = 0;
    game.newHighScore = false;
    game.shareCopiedTimer = 0;
    game.nightMode = false;
    game.transitionTimer = 0;
    game.transitionFromTheme = 'mumbai';
    game.transitionToTheme = 'mumbai';
    game.transitionFromNight = false;
    game.transitionToNight = false;
    game.nightFlash = 0;
    game.batImpactTimer = 0;
    currentTheme = 'mumbai';
    lastThemeDistance = 0;
    game.eventBanner = null;
    game.eventBannerQueue.length = 0;
    game.dodgeCount = 0;
    game.endScreenAudioPlayed = false;
    batSwingTimer = 0;
    resetPlayer();
    if (startFromMenu) {
      game.showcaseTimer = 0;
      game.showcaseIndex = 0;
    }
  }

  function setState(next) {
    game.prevState = game.state;
    game.state = next;
    if (next === STATES.COUNTDOWN) {
      resetRun(false);
      game.countdownStage = 0;
      game.countdownTime = 0;
      emitParticles(W / 2, H / 2, 10, { colors: ['#FF4444'], minLife: 20, maxLife: 30, minSpeed: 1, maxSpeed: 5, gravity: 0.05 });
    } else if (next === STATES.SPLASH) {
      resetRun(true);
    } else if (next === STATES.PAUSED) {
      game.inputHold = false;
    } else if (next === STATES.PLAYING) {
      game.inputHold = false;
    }
  }

  function updateLevel() {
    const prev = game.level;
    game.level = LEVELS.findIndex((l) => game.score >= l.min && game.score <= l.max) + 1;
    if (game.level <= 0) game.level = 5;
    game.speedMult = LEVELS[game.level - 1].mult;
    game.worldSpeed = BASE_SCROLL_SPEED * game.speedMult;
    maybeRotateWorldTheme();
    updateWorldTransition();
    if (game.level !== prev) {
      game.levelFlash = 18;
      game.levelUpTimer = 60;
      game.milestonePulse = 18;
    }
  }

  function updateFloatTexts() {
    for (let i = game.floatTexts.length - 1; i >= 0; i--) {
      const t = game.floatTexts[i];
      t.y -= 0.8;
      t.life--;
      if (t.life <= 0) game.floatTexts.splice(i, 1);
    }
  }

  function updatePlaying() {
    game.score += 1;
    game.distance += game.worldSpeed * 0.12;
    updateLevel();
    if (game.score >= game.scoreMilestone) {
      triggerSlangBurst(SLANGS.SOLID, W / 2, 200, false, true);
      for (let i = 0; i < 30; i++) emitParticles(rand(0, W), 0, 1, { colors: PALETTE, minRadius: 4, maxRadius: 9, minSpeed: 2, maxSpeed: 5, gravity: 0.05, minLife: 80, maxLife: 120, spread: 0.8, dir: Math.PI / 2 });
      game.scoreMilestone += 500;
    }
    updateBackground(game.speedMult);
    updatePlayer();
    updateObstacles();
    updateCollectibles();
    updateParticles();
    updateFloatTexts();
    updateEventBanner();
    updateSlangBurst();
    if (player.hurtTimer === 0 && game.combo > 0 && game.obstacles.some((o) => rectOverlap(playerCollisionBox().x, playerCollisionBox().y, playerCollisionBox().w, playerCollisionBox().h, o.x, o.y - o.h, o.w, o.h))) {
      game.combo = 0;
    }
    if (batSwingTimer > 0) batSwingTimer--;
    if (game.batImpactTimer > 0) game.batImpactTimer--;
    if (game.levelFlash > 0) game.levelFlash--;
    if (game.levelUpTimer > 0) game.levelUpTimer--;
    if (game.milestonePulse > 0) game.milestonePulse--;
    if (game.nightFlash > 0) game.nightFlash--;
    if (game.redFlash > 0) game.redFlash--;
    if (game.screenShake > 0) game.screenShake--;
  }

  function updateCountdown() {
    updateBackground(0.45);
    updateParticles();
    updateEventBanner();
    updateSlangBurst();
    game.countdownTime++;
    if (game.countdownStage < 3 && game.countdownTime >= 60) {
      game.countdownStage++;
      game.countdownTime = 0;
      if (game.countdownStage === 3) emitParticles(W / 2, H / 2, 20, { colors: ['#00FF88', '#FFFFFF', '#FFD700'], minRadius: 4, maxRadius: 7, minSpeed: 3, maxSpeed: 8, gravity: 0.08, minLife: 24, maxLife: 36 });
    } else if (game.countdownStage === 3 && game.countdownTime >= 30) {
      setState(STATES.PLAYING);
    }
  }

  function updateSplash() {
    game.splashTimer++;
    game.showcaseTimer++;
    updateBackground(0.55);
    updateEventBanner();
    updatePlayer();
    if (game.showcaseTimer % 180 === 0) game.showcaseIndex = (game.showcaseIndex + 1) % SHOWCASE.length;
  }

  function updateGameOver() {
    updateBackground(0.25);
    updateParticles();
    updateEventBanner();
    updateSlangBurst();
    updatePlayer();
    updateFloatTexts();
    game.gameOverTimer++;
    if (game.gameOverTimer === 72 && !game.endScreenAudioPlayed) {
      game.endScreenAudioPlayed = true;
      if (game.newHighScore) {
        triggerGameplayFeedback('endHighScore');
      } else {
        triggerGameplayFeedback('endNormal');
      }
    }
    if (game.shareCopiedTimer > 0) game.shareCopiedTimer--;
    if (game.screenShake > 0) game.screenShake--;
  }

  function update() {
    game.frame++;
    scheduleMusic();
    if (game.state === STATES.SPLASH) updateSplash();
    else if (game.state === STATES.COUNTDOWN) updateCountdown();
    else if (game.state === STATES.PLAYING) updatePlaying();
    else if (game.state === STATES.GAME_OVER) updateGameOver();
    else if (game.state === STATES.PAUSED) {
      if (game.shareCopiedTimer > 0) game.shareCopiedTimer--;
    }
  }

  function drawWorld(c, frozen = false, splashOnly = false, overlayAlpha = 0) {
    c.clearRect(0, 0, W, H);
    drawFarLayer(c);
    drawNightBackdrop(c, getWorldNightBlend());
    for (const cl of game.clouds) drawCloud(c, cl.x, cl.y, cl.scale);
    for (const s of game.stalls) drawDecorStall(c, s);
    drawCityScenery(c);
    drawRoad(c, game.worldSpeed);
    drawSpeedLines(c);
    for (const col of game.collectibles) drawCollectible(c, col);
    for (const ob of game.obstacles) drawObstacle(c, ob);
    drawParticles(c);

    // Skip player drawing in drawWorld during splash (drawSplash draws its own centered kangaroo)
    if (!splashOnly) {
    let state = 'running';
    let frame = Math.floor((game.frame / 6) % 4);
    let squashX = 1;
    let squashY = 1;
    let peak = false;
    if (game.state === STATES.SPLASH) state = 'idle';
    else if (!player.onGround && game.state !== STATES.GAME_OVER) {
      state = 'jump';
      frame = Math.floor((game.frame / 8) % 2);
      peak = Math.abs(player.vy) < 1.5;
    }
    if (player.squashTimer > 0) {
      const p = player.squashTimer / 12;
      squashX = lerp(1, 1.15, p);
      squashY = lerp(1, 0.88, p);
    }
    const alpha = player.hurtTimer > 0 && Math.floor(player.hurtTimer / 4) % 2 === 0 ? 0.3 : 1;
    const playerHeightOffGround = clamp((GROUND_Y - player.y) / 110, 0, 1);
    c.save();
    c.globalAlpha = 0.18 - playerHeightOffGround * 0.08;
    c.fillStyle = 'rgba(0,0,0,0.85)';
    c.beginPath();
    c.ellipse(player.x + 2, GROUND_Y + 6, 18 - playerHeightOffGround * 7, 6 - playerHeightOffGround * 2, 0, 0, Math.PI * 2);
    c.fill();
    c.restore();
    drawKangaroo(c, player.x, player.y, PLAYER_DRAW_SCALE, {
      state,
      frame,
      peak,
      blink: player.blinkFrame > 0,
      hurt: player.hurtTimer > 0,
      hurtTilt: player.hurtTilt,
      alpha,
      squashX,
      squashY,
      idleBreath: Math.sin(game.splashTimer / 30) * 0.02,
      deadAngle: player.deadAngle
    });
    drawBatImpact(c);
    } // end splashOnly player skip

    drawFloatingTexts(c);
    drawSlangBurst(c);
    if (!splashOnly) drawTopBar(c);
    if (!splashOnly) drawEventBanner(c);
    if (game.levelUpTimer > 0 && game.state === STATES.PLAYING) {
      c.globalAlpha = game.levelUpTimer / 60;
      c.fillStyle = '#fff';
      c.textAlign = 'center';
      c.font = 'bold 26px Arial';
      c.fillText('LEVEL UP!', W / 2, 96);
      c.globalAlpha = 1;
    }
    if (game.nightFlash > 0 && game.state === STATES.PLAYING) {
      c.globalAlpha = game.nightFlash / 120;
      c.fillStyle = game.transitionTimer > 0 || getWorldNightBlend() > 0.5 ? '#DDF6FF' : '#FFE3B3';
      c.textAlign = 'center';
      c.font = 'bold 24px Arial';
      c.fillText(game.transitionTimer > 0 ? 'SCENE SHIFT' : (getWorldNightBlend() > 0.5 ? 'CITY AFTER DARK' : 'DAYLIGHT RUN'), W / 2, 72);
      c.globalAlpha = 1;
    }
    drawProgressBar(c);
    if (game.redFlash > 0) {
      c.fillStyle = `rgba(255,0,0,${0.15 * (game.redFlash / 18)})`;
      c.fillRect(0, 0, W, H);
    }
    if (overlayAlpha > 0) {
      c.fillStyle = `rgba(0,0,0,${overlayAlpha})`;
      c.fillRect(0, 0, W, H);
    }
  }

  function drawScanlines(c) {
    if (IS_COARSE_POINTER) return;
    c.save();
    c.strokeStyle = 'rgba(0,0,0,0.04)';
    c.lineWidth = 1;
    for (let y = 0; y < H; y += 4) {
      c.beginPath();
      c.moveTo(0, y + 0.5);
      c.lineTo(W, y + 0.5);
      c.stroke();
    }
    c.restore();
  }

  function render() {
    const ww = canvas.clientWidth;
    const wh = canvas.clientHeight;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const scale = Math.min(ww / W, wh / H);
    const drawW = W * scale;
    const drawH = H * scale;
    const ox = (ww - drawW) / 2;
    const oy = (wh - drawH) / 2;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (game.screenShake > 0) {
      const strength = (game.screenShake / 30) * 4;
      ctx.translate(rand(-strength, strength), rand(-strength, strength));
    }
    ctx.translate(ox, oy);
    ctx.scale(scale, scale);

    if (game.state === STATES.SPLASH) drawSplash(ctx);
    else if (game.state === STATES.COUNTDOWN) drawCountdown(ctx);
    else if (game.state === STATES.PLAYING) drawWorld(ctx, false, false);
    else if (game.state === STATES.PAUSED) drawPaused(ctx);
    else if (game.state === STATES.GAME_OVER) drawGameOver(ctx);

    drawScanlines(ctx);
  }

  function loop(ts) {
    if (document.hidden) {
      hiddenPaused = true;
      lastTime = ts;
      rafId = requestAnimationFrame(loop);
      return;
    }
    if (hiddenPaused) {
      hiddenPaused = false;
      lastTime = ts;
    }
    const dt = Math.min(MAX_DT, ts - (lastTime || ts));
    lastTime = ts;
    acc += dt;
    while (acc >= FIXED_DT) {
      update();
      acc -= FIXED_DT;
    }
    render();
    rafId = requestAnimationFrame(loop);
  }

  // ===== INPUT HANDLING =====
  function inRect(x, y, rect, pad = 0) {
    return x >= rect.x - pad && x <= rect.x + rect.w + pad && y >= rect.y - pad && y <= rect.y + rect.h + pad;
  }

  function screenToGame(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scale = Math.min(rect.width / W, rect.height / H);
    const drawW = W * scale;
    const drawH = H * scale;
    const ox = (rect.width - drawW) / 2;
    const oy = (rect.height - drawH) / 2;
    const x = (clientX - rect.left - ox) / scale;
    const y = (clientY - rect.top - oy) / scale;
    return { x, y };
  }

  function handlePrimaryDown(x, y) {
    const hitSlop = TOUCH_HIT_SLOP;
    if (!game.firstInteractionDone) {
      game.firstInteractionDone = true;
      resumeAudio();
    } else {
      resumeAudio();
    }
    if (game.state === STATES.SPLASH) {
      setState(STATES.COUNTDOWN);
      return;
    }
    if (game.state === STATES.COUNTDOWN) return;
    if (game.state === STATES.PLAYING) {
      if (inRect(x, y, BUTTONS.pause, hitSlop)) return setState(STATES.PAUSED);
      if (inRect(x, y, BUTTONS.mute, hitSlop)) return toggleMute();
      const now = performance.now();
      if (!player.onGround && now - game.lastTapTime < 300) jump();
      else jump();
      game.lastTapTime = now;
      game.inputHold = true;
      return;
    }
    if (game.state === STATES.PAUSED) {
      if (inRect(x, y, BUTTONS.pausedResume, hitSlop)) return setState(STATES.PLAYING);
      if (inRect(x, y, BUTTONS.pausedQuit, hitSlop)) return setState(STATES.SPLASH);
    }
    if (game.state === STATES.GAME_OVER && game.gameOverTimer >= 72) {
      if (inRect(x, y, BUTTONS.overPlay, hitSlop)) return setState(STATES.COUNTDOWN);
      if (inRect(x, y, BUTTONS.overMenu, hitSlop)) return setState(STATES.SPLASH);
    }
  }

  function handlePrimaryUp() {
    game.inputHold = false;
  }

  canvas.addEventListener('pointerdown', (e) => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    e.preventDefault();
    const p = screenToGame(e.clientX, e.clientY);
    handlePrimaryDown(p.x, p.y);
    if (typeof canvas.setPointerCapture === 'function') {
      try { canvas.setPointerCapture(e.pointerId); } catch (err) { void err; }
    }
  }, { passive: false });
  canvas.addEventListener('pointermove', (e) => {
    if (game.state !== STATES.SPLASH) e.preventDefault();
  }, { passive: false });
  window.addEventListener('pointerup', handlePrimaryUp);
  window.addEventListener('pointercancel', handlePrimaryUp);
  window.addEventListener('blur', handlePrimaryUp);
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('touchmove', (e) => {
    if (game.state !== STATES.SPLASH) e.preventDefault();
  }, { passive: false });
  window.addEventListener('wheel', (e) => {
    if (game.state !== STATES.SPLASH) e.preventDefault();
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if (['Space', 'ArrowUp', 'Escape', 'KeyM'].includes(e.code)) e.preventDefault();
    if (!game.firstInteractionDone) {
      game.firstInteractionDone = true;
      resumeAudio();
    }
    if (e.code === 'Escape') {
      if (game.state === STATES.PLAYING) setState(STATES.PAUSED);
      else if (game.state === STATES.PAUSED) setState(STATES.PLAYING);
      return;
    }
    if (e.code === 'KeyM') return toggleMute();
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      if (game.state === STATES.SPLASH) setState(STATES.COUNTDOWN);
      else if (game.state === STATES.PLAYING) {
        jump();
        game.inputHold = true;
      } else if (game.state === STATES.GAME_OVER && game.gameOverTimer >= 72) {
        setState(STATES.COUNTDOWN);
      }
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') game.inputHold = false;
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && game.state === STATES.PLAYING) setState(STATES.PAUSED);
  });

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', resizeCanvas);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeCanvas);

  // ===== INIT =====
  function rand(min, max) { return Math.random() * (max - min) + min; }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function smoothstep(t) { return t * t * (3 - 2 * t); }
  function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }
  function overshoot(t) { return 1 + (--t) * t * ((1.70158 + 1) * t + 1.70158); }
  function easeOutBounce(x) {
    const n1 = 7.5625;
    const d1 = 2.75;
    if (x < 1 / d1) return n1 * x * x;
    if (x < 2 / d1) return n1 * (x -= 1.5 / d1) * x + 0.75;
    if (x < 2.5 / d1) return n1 * (x -= 2.25 / d1) * x + 0.9375;
    return n1 * (x -= 2.625 / d1) * x + 0.984375;
  }
  function easeInCubic(x) { return x * x * x; }
  function hexToRgba(hex, alpha) {
    const clean = hex.replace('#', '');
    const bigint = parseInt(clean.length === 3 ? clean.split('').map((s) => s + s).join('') : clean, 16);
    const r = (bigint >> 16) & 255;
    const g = (bigint >> 8) & 255;
    const b = bigint & 255;
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function blendHexColor(a, b, t) {
    const toRgb = (hex) => {
      const clean = hex.replace('#', '');
      const full = clean.length === 3 ? clean.split('').map((s) => s + s).join('') : clean;
      const value = parseInt(full, 16);
      return {
        r: (value >> 16) & 255,
        g: (value >> 8) & 255,
        b: value & 255
      };
    };
    const ca = toRgb(a);
    const cb = toRgb(b);
    return `rgb(${Math.round(lerp(ca.r, cb.r, t))}, ${Math.round(lerp(ca.g, cb.g, t))}, ${Math.round(lerp(ca.b, cb.b, t))})`;
  }

  function blendRgbaColor(a, b, t) {
    const parse = (input) => {
      const match = input.match(/rgba?\(([^)]+)\)/);
      if (!match) return { r: 0, g: 0, b: 0, a: 1 };
      const parts = match[1].split(',').map((part) => Number(part.trim()));
      return { r: parts[0], g: parts[1], b: parts[2], a: parts.length > 3 ? parts[3] : 1 };
    };
    const ca = parse(a);
    const cb = parse(b);
    return `rgba(${Math.round(lerp(ca.r, cb.r, t))},${Math.round(lerp(ca.g, cb.g, t))},${Math.round(lerp(ca.b, cb.b, t))},${lerp(ca.a, cb.a, t).toFixed(3)})`;
  }

  function renderGameToText() {
    const payload = {
      mode: game.state,
      score: Math.floor(game.score),
      level: game.level,
      theme: currentTheme,
      themeTarget: game.transitionTimer > 0 ? game.transitionToTheme : currentTheme,
      nightMode: isNightMode(),
      nightBlend: Number(getWorldNightBlend().toFixed(2)),
      transitionActive: game.transitionTimer > 0,
      transitionProgress: Number(getWorldTransitionProgress().toFixed(2)),
      eventBanner: game.eventBanner ? {
        text: game.eventBanner.text,
        life: game.eventBanner.life,
        maxLife: game.eventBanner.maxLife
      } : null,
      worldSpeed: Number(game.worldSpeed.toFixed(2)),
      player: {
        x: Number(player.x.toFixed(1)),
        y: Number(player.y.toFixed(1)),
        onGround: player.onGround,
        vy: Number(player.vy.toFixed(2))
      },
      obstacles: game.obstacles.map((ob) => ({
        type: ob.type,
        x: Number(ob.x.toFixed(1)),
        y: Number(ob.y.toFixed(1)),
        w: ob.w,
        h: ob.h
      })),
      collectibles: game.collectibles.map((col) => ({
        type: col.type,
        x: Number(col.x.toFixed(1)),
        y: Number(col.y.toFixed(1))
      }))
    };
    return JSON.stringify(payload, null, 2);
  }

  window.render_game_to_text = renderGameToText;
  window.advanceTime = (ms = FIXED_DT) => {
    const steps = Math.max(1, Math.round(ms / FIXED_DT));
    for (let i = 0; i < steps; i++) update();
    render();
  };
  window.kangarooRunDebug = {
    setScore(score) {
      game.score = score;
      updateLevel();
      render();
    },
    setDistance(distance) {
      game.distance = distance;
      maybeRotateWorldTheme();
      updateLevel();
      render();
    },
    getState() {
      return JSON.parse(renderGameToText());
    }
  };

  buildFarLayer();
  initBackgroundObjects();
  resizeCanvas();
  resetRun(true);
  lastTime = performance.now();
  rafId = requestAnimationFrame(loop);
  </script>
</body>
</html>
